name: Submit New Entry
description: Add a bill, regulation, lawsuit, or research paper to the HT Tracker
title: "[SUBMISSION] "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a New Tracker Entry
        Fill in the fields below. Your entry will be **automatically added to the live tracker within ~1 minute** after you submit this form.

        A free GitHub account is required. Your GitHub username will appear as the submitter on the entry's timeline.

        Your **local stars, notes, and annotations** in the tracker are private to your browser and are never shared.

  - type: dropdown
    id: entry_type
    attributes:
      label: Entry Type
      description: What kind of entry is this?
      options:
        - legislation
        - regulatory
        - lawsuit
        - research
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
      description: Full official title of the bill, case, or paper
      placeholder: "e.g. Stop Enabling Sex Traffickers Act (SESTA)"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date (YYYY-MM-DD)
      description: Date introduced, filed, or published
      placeholder: "2024-03-15"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 1–3 sentences describing what this is and why it matters for anti-trafficking work
      placeholder: "This bill requires..."
    validations:
      required: true

  - type: input
    id: identifier
    attributes:
      label: Bill / Case Number / DOI
      description: Official identifier if there is one (optional)
      placeholder: "H.R. 1865  ·  No. 1:23-cv-00001  ·  10.1016/j.xxx"

  - type: input
    id: url
    attributes:
      label: Primary Source URL
      description: Link to the official source — congress.gov, court filing, journal page, etc. (optional but strongly encouraged)
      placeholder: "https://"

  - type: input
    id: status
    attributes:
      label: Current Status
      placeholder: "Introduced, Enacted, Ongoing, Published, Settled, Dismissed..."

  - type: dropdown
    id: trafficking_types
    attributes:
      label: Trafficking Type(s)
      multiple: true
      options:
        - sex
        - labor
        - both

  - type: input
    id: jurisdiction
    attributes:
      label: Jurisdiction
      placeholder: "federal  ·  California  ·  international"

  - type: input
    id: sponsor
    attributes:
      label: Sponsor / Lead Author / Plaintiff
      placeholder: "Rep. Jane Smith (D-CA)  ·  or lead author name  ·  or plaintiff name"

  - type: textarea
    id: description
    attributes:
      label: Additional Details (optional)
      description: Longer description, key provisions, case background, paper methodology, etc.
      placeholder: "Leave blank if not needed."

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This entry is directly relevant to human trafficking policy, litigation, or research
          required: true
        - label: I have included a source URL or identifier so the lab can verify this entry
          required: false
